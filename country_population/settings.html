<div class="form-group">
  <label for="title" class="form-label">Header Text</label>
  <input id="title" name="title" type="text" class="form-input" placeholder="Country Population" />
</div>

<div class="form-group">
  <label for="country" class="form-label">Country Name</label>
  <input
    type="text"
    id="country"
    name="country"
    list="country-list"
    placeholder="United States"
    required
    class="form-input"
    autocomplete="off"
  />

    <option value="France"></option>
    <option value="Germany"></option>
    <option value="Greece"></option>
    <option value="Hungary"></option>
    <option value="India"></option>
    <option value="Indonesia"></option>
    <option value="Ireland"></option>
    <option value="Israel"></option>
    <option value="Italy"></option>
    <option value="Japan"></option>
    <option value="Malaysia"></option>
    <option value="Mexico"></option>
    <option value="Netherlands"></option>
    <option value="New Zealand"></option>
    <option value="Nigeria"></option>
    <option value="Norway"></option>
    <option value="Pakistan"></option>

    <option value="Sweden"></option>
    <option value="Switzerland"></option>

    <option value="Turkey"></option>
    <option value="Ukraine"></option>
    <option value="United Arab Emirates"></option>

    <option value="United States"></option>
    <option value="Vietnam"></option>

</div>

<hr style="border: 0; border-top: 1px solid rgba(0, 0, 0, 0.12); margin: 24px 0 18px" />

<div class="form-group" style="margin-bottom: 20px">
  <div
    style="
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      margin-bottom: 10px;
    "
  >
    Plugin Repository
  </div>

  <div style="background: #f8f9fa; border: 1px solid #dcdfe3; border-radius: 10px; padding: 14px 16px">
    <a
      href="https://github.com/shadal18/inkypi-country-population"
      target="_blank"
      rel="noopener noreferrer"
      style="
        color: #0d6efd;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        word-break: break-word;
        display: inline-block;
        margin-bottom: 6px;
      "
    >
      github.com/shadal18/inkypi-country-population
    </a>

    <div style="font-size: 0.9rem; color: #666">Setup help, updates, release notes, and source code.</div>
  </div>
</div>

<style>
  .floatingchat-container-wrap,
  .floating-chat-kofi-popup-iframe {
    left: unset !important;
    right: 16px !important;
  }

  .floatingchat-container-wrap {
    bottom: 14px !important;
  }

  .floating-chat-kofi-popup-iframe {
    bottom: 76px !important;
  }
</style>

<script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const titleInput = document.getElementById("title")
    const countryInput = document.getElementById("country")

    if (typeof loadPluginSettings !== "undefined" && loadPluginSettings) {
      if (titleInput) titleInput.value = pluginSettings.title || "Country Population"
      if (countryInput) countryInput.value = pluginSettings.country || "United States"
    } else {
      if (titleInput) titleInput.value = "Country Population"
      if (countryInput) countryInput.value = "United States"
    }

    if (typeof kofiWidgetOverlay !== "undefined") {
      kofiWidgetOverlay.draw("shadal", {
        type: "floating-chat",
        "floating-chat.donateButton.text": "More coffee",
        "floating-chat.donateButton.background-color": "#00b9fe",
        "floating-chat.donateButton.text-color": "#fff",
      })
    }
  })
</script>
